spring.application.name=Heritage-Slabs

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/heritageslabs?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate configurations (update tables instead of auto-creating everything)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Run SQL init script to fix column types
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

